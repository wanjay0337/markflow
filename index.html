<!DOCTYPE html>
<html lang="zh-TW" class="dk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MarkFlow Studio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
<script src="https://unpkg.com/docx@7.8.2/build/index.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Serif:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#161616;--surf:#1e1e1e;--surf2:#262626;--surf3:#353535;
  --ink:#f4f4f4;--ink2:#a8a8a8;--ink3:#6f6f6f;
  --line:rgba(244,244,244,.06);--line2:rgba(244,244,244,.14);
  --acc:#78a9ff;--acc2:#1a2033;--grn:#42be65;
  --fu:'IBM Plex Sans',sans-serif;--fs:'IBM Plex Serif',Georgia,serif;--fm:'IBM Plex Mono',monospace;
  --r:4px;
}
.lt{
  --bg:#f4f4f4;--surf:#fff;--surf2:#e8e8e8;--surf3:#d8d8d8;
  --ink:#161616;--ink2:#525252;--ink3:#8d8d8d;
  --line:rgba(22,22,22,.07);--line2:rgba(22,22,22,.15);
  --acc:#0f62fe;--acc2:#edf5ff;--grn:#24a148;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--fu);background:var(--bg);color:var(--ink);display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;transition:background .2s,color .2s}
/* NAV */
nav{height:48px;background:var(--surf);border-bottom:1px solid var(--line2);display:flex;align-items:center;padding:0 0 0 16px;flex-shrink:0;z-index:20}
.logo{font-family:var(--fm);font-size:13px;font-weight:500;color:var(--ink);letter-spacing:.5px;user-select:none;flex-shrink:0;display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--acc);flex-shrink:0}
.view-tabs{display:flex;align-items:stretch;height:100%;margin-left:20px}
.vt{height:100%;padding:0 14px;border:none;background:transparent;font-family:var(--fu);font-size:12px;font-weight:400;color:var(--ink3);cursor:pointer;transition:all .15s;white-space:nowrap;position:relative}
.vt:hover{color:var(--ink2)}
.vt.on{color:var(--ink);font-weight:500}
.vt.on::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--acc)}
.spacer{flex:1}
.btn{height:32px;display:inline-flex;align-items:center;gap:5px;padding:0 12px;font-family:var(--fu);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;border:1px solid var(--line2);background:transparent;color:var(--ink2);margin-right:8px}
.btn:hover{background:var(--surf2);color:var(--ink)}
.btn-sq{width:32px;padding:0;justify-content:center;border-radius:var(--r)}
.btn-exp{border-radius:var(--r)}
.btn-exp.active,.btn-exp:hover{background:var(--surf2);color:var(--ink)}
/* STRIP */
.fstrip{height:38px;background:var(--bg);border-bottom:1px solid var(--line2);display:flex;align-items:center;padding:0 12px;gap:0;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.fstrip::-webkit-scrollbar{display:none}
.fsep{width:1px;height:16px;background:var(--line2);margin:0 6px;flex-shrink:0}
.fb{height:26px;min-width:30px;padding:0 7px;border:none;border-radius:var(--r);background:transparent;color:var(--ink3);font-family:var(--fm);font-size:11px;font-weight:500;cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center;white-space:nowrap;flex-shrink:0}
.fb:hover{background:var(--surf2);color:var(--ink)}
/* WORKSPACE */
.workspace{flex:1;display:flex;overflow:hidden;min-height:0}
.ed-pane{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#editor{flex:1;width:100%;padding:36px 8% 60px;background:var(--surf);color:var(--ink);border:none;outline:none;resize:none;font-family:var(--fm);font-size:13px;line-height:2;tab-size:2;overflow-y:auto;caret-color:var(--acc);transition:background .2s,color .2s;border-right:1px solid var(--line2)}
#editor::placeholder{color:var(--ink3)}
#editor::-webkit-scrollbar{width:4px}
#editor::-webkit-scrollbar-thumb{background:var(--surf3);border-radius:4px}
.div-handle{width:1px;background:var(--line2);cursor:col-resize;flex-shrink:0;transition:background .15s;position:relative}
.div-handle::after{content:'';position:absolute;inset:0 -3px}
.div-handle:hover,.div-handle.drag{background:var(--acc)}
.pv-pane{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0}
.pv-scroll{flex:1;overflow-y:auto;background:var(--bg)}
.pv-scroll::-webkit-scrollbar{width:4px}
.pv-scroll::-webkit-scrollbar-thumb{background:var(--surf3);border-radius:4px}
#preview{max-width:700px;margin:0 auto;padding:36px 40px 80px;font-family:var(--fu);font-weight:300;font-size:15px;line-height:1.75;color:var(--ink)}
#preview h1{font-family:var(--fs);font-size:1.9em;font-weight:400;color:var(--ink);margin:0 0 .4em;line-height:1.2}
#preview h2{font-size:1.15em;font-weight:500;color:var(--ink);margin:2em 0 .5em;padding-bottom:.4em;border-bottom:1px solid var(--line2)}
#preview h3{font-family:var(--fm);font-size:.78em;font-weight:500;color:var(--acc);margin:1.8em 0 .5em;letter-spacing:.5px}
#preview h4,#preview h5,#preview h6{font-size:1em;font-weight:500;color:var(--ink);margin:1.5em 0 .3em}
#preview p{margin:0 0 .9em;font-weight:300}
#preview a{color:var(--acc);text-decoration:underline;text-underline-offset:3px}
#preview strong{font-weight:500;color:var(--ink)}
#preview em{font-style:italic;font-family:var(--fs)}
#preview ul,#preview ol{margin:0 0 .9em 1.4em}
#preview li{margin:.25em 0;font-weight:300}
#preview blockquote{margin:1.2em 0;padding:.8em 1em;border-left:2px solid var(--acc);background:var(--acc2);color:var(--ink2);font-style:italic}
#preview code{font-family:var(--fm);font-size:.83em;background:var(--surf2);border:1px solid var(--line2);border-radius:2px;padding:1px 5px;color:var(--acc)}
#preview pre{background:var(--surf);border:1px solid var(--line2);border-radius:var(--r);padding:16px 18px;overflow-x:auto;margin:.8em 0}
#preview pre code{background:none;border:none;padding:0;font-size:.86em;line-height:1.8;color:var(--ink)}
#preview table{width:100%;border-collapse:collapse;margin:1em 0;font-size:.9em}
#preview th{font-family:var(--fm);font-size:.72em;font-weight:500;letter-spacing:.5px;text-align:left;padding:6px 12px;border-bottom:1px solid var(--line2);color:var(--ink3)}
#preview td{padding:7px 12px;border-bottom:1px solid var(--line);font-weight:300}
#preview hr{border:none;border-top:1px solid var(--line2);margin:2em 0}
#preview img{max-width:100%;border-radius:var(--r)}
/* BOTBAR */
.botbar{height:44px;background:var(--surf);border-top:1px solid var(--line2);display:flex;align-items:center;padding:0;flex-shrink:0;overflow:hidden}
.stats{display:flex;align-items:center;padding:0 16px;gap:0;flex:1;border-right:1px solid var(--line2);height:100%}
.stat{font-size:11px;font-family:var(--fm);color:var(--ink3);padding:0 10px;height:100%;display:flex;align-items:center;border-right:1px solid var(--line)}
.stat:first-child{padding-left:0}
.stat b{color:var(--ink2);font-weight:500;margin-right:3px}
#ss{border-right:none}
.mob-tabs{display:none;align-items:center;padding:0 12px;flex:1;border-right:1px solid var(--line2);height:100%}
.mt{height:100%;padding:0 12px;border:none;background:transparent;font-family:var(--fu);font-size:12px;font-weight:400;color:var(--ink3);cursor:pointer;transition:all .15s;white-space:nowrap;position:relative}
.mt.on{color:var(--ink);font-weight:500}
.mt.on::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--acc)}
.bot-actions{display:flex;align-items:center;height:100%;padding:0 8px;gap:6px;flex-shrink:0}
.btn-pdf{background:var(--acc);color:var(--bg);border-color:var(--acc);border-radius:var(--r)}
.btn-pdf:hover{opacity:.82}
.btn-import{border-radius:var(--r)}
/* EXPORT PANEL */
.exp-panel{background:var(--surf);border-top:1px solid var(--line2);flex-shrink:0;overflow:hidden;max-height:0;transition:max-height .3s cubic-bezier(.4,0,.2,1),padding .3s;padding:0 20px}
.exp-panel.open{max-height:300px;padding:18px 20px 18px}
.exp-inner{display:flex;flex-direction:column;gap:14px}
.exp-label{font-size:10px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;color:var(--ink3);font-family:var(--fm);margin-bottom:4px}
.exp-fname-row{display:flex;align-items:center;gap:8px}
.exp-fname{flex:1;height:30px;padding:0 10px;background:var(--surf2);border:1px solid var(--line2);border-radius:var(--r);color:var(--ink);font-family:var(--fm);font-size:12px;outline:none;transition:border-color .15s}
.exp-fname:focus{border-color:var(--acc)}
.exp-hint{font-size:11px;color:var(--ink3);font-family:var(--fm);white-space:nowrap}
.exp-div{height:1px;background:var(--line2)}
.exp-row{display:flex;gap:6px;flex-wrap:wrap}
.eb{height:30px;display:inline-flex;align-items:center;gap:6px;padding:0 12px;border-radius:var(--r);font-family:var(--fu);font-size:12px;font-weight:400;cursor:pointer;transition:all .14s;white-space:nowrap;border:1px solid var(--line2);background:transparent;color:var(--ink2)}
.eb:hover{background:var(--surf2);color:var(--ink)}
.eb-hi{background:var(--acc);color:var(--bg);border-color:var(--acc)}
.eb-hi:hover{opacity:.82}
.eb-acc{color:var(--acc);border-color:var(--acc);background:var(--acc2)}
.eb-acc:hover{opacity:.8}
.drag-over{outline:1px dashed var(--acc);outline-offset:-3px}
#toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%) translateY(6px);background:var(--surf3);color:var(--ink);font-family:var(--fm);font-size:11px;padding:6px 14px;border-radius:var(--r);border:1px solid var(--line2);opacity:0;transition:all .18s;pointer-events:none;white-space:nowrap;z-index:9999;letter-spacing:.3px}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:767px){
  .stats{display:none}.mob-tabs{display:flex}.view-tabs{display:none}
  nav{padding:0 0 0 12px}#editor{padding:24px 16px 60px;font-size:14px;border-right:none}
  #preview{padding:24px 16px 60px;font-size:15px}
  .pv-pane.m-hide,.ed-pane.m-hide{display:none}.div-handle{display:none}
  .exp-panel.open{max-height:360px;padding:14px 14px 14px}
  .eb{height:34px;font-size:13px}.exp-fname{height:34px}
}
@media(min-width:768px){.mob-tabs{display:none!important}}
</style>
</head>
<body>
<nav>
  <div class="logo"><span class="logo-dot"></span>MARKFLOW</div>
  <div class="view-tabs">
    <button class="vt on" data-v="split" onclick="setView('split')">Split</button>
    <button class="vt" data-v="write" onclick="setView('write')">Write</button>
    <button class="vt" data-v="preview" onclick="setView('preview')">Preview</button>
  </div>
  <div class="spacer"></div>
  <button class="btn btn-exp" id="exp-toggle" onclick="toggleExp()">Export ↓</button>
  <button class="btn btn-sq" onclick="toggleDark()" title="Toggle theme">
    <svg id="ico-d" width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M14 8.5A6 6 0 1 1 7.5 2a4.5 4.5 0 0 0 6.5 6.5z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
    <svg id="ico-l" width="14" height="14" viewBox="0 0 16 16" fill="none" style="display:none"><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.4"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.22 3.22l1.42 1.42M11.36 11.36l1.42 1.42M11.36 4.64l1.42-1.42M3.22 12.78l1.42-1.42" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
  </button>
</nav>
<div class="fstrip">
  <button class="fb" onclick="ins('**','**','bold')"><b>B</b></button>
  <button class="fb" onclick="ins('*','*','italic')" style="font-style:italic">I</button>
  <button class="fb" onclick="ins('~~','~~','strike')" style="text-decoration:line-through">S</button>
  <button class="fb" onclick="ins('`','`','code')">`x`</button>
  <div class="fsep"></div>
  <button class="fb" onclick="insLine('# ')">H1</button>
  <button class="fb" onclick="insLine('## ')">H2</button>
  <button class="fb" onclick="insLine('### ')">H3</button>
  <div class="fsep"></div>
  <button class="fb" onclick="insLine('- ')">- List</button>
  <button class="fb" onclick="insLine('1. ')">1. List</button>
  <button class="fb" onclick="insLine('> ')">> Quote</button>
  <button class="fb" onclick="insCode()">``` Block</button>
  <div class="fsep"></div>
  <button class="fb" onclick="insLine('---')">--- HR</button>
  <button class="fb" onclick="insLink()">[Link]</button>
  <button class="fb" onclick="insTable()">|Table|</button>
</div>
<div class="workspace">
  <div class="ed-pane" id="edp">
    <textarea id="editor" placeholder="# Start writing..." spellcheck="false"></textarea>
  </div>
  <div class="div-handle" id="dvd"></div>
  <div class="pv-pane" id="pvp">
    <div class="pv-scroll"><div id="preview"></div></div>
  </div>
</div>
<div class="botbar">
  <div class="stats">
    <span class="stat"><b id="sw">0</b> words</span>
    <span class="stat"><b id="sc">0</b> chars</span>
    <span class="stat"><b id="sl">0</b> lines</span>
    <span class="stat"><b id="sr">0</b> min</span>
    <span class="stat" id="ss" style="color:var(--grn)">ready</span>
  </div>
  <div class="mob-tabs">
    <button class="mt on" data-t="edit" onclick="mTab('edit')">Edit</button>
    <button class="mt" data-t="preview" onclick="mTab('preview')">Preview</button>
  </div>
  <div class="spacer"></div>
  <div class="bot-actions">
    <input type="file" id="fi" accept=".md,.txt" style="display:none">
    <button class="btn btn-import" onclick="document.getElementById('fi').click()">
      <svg width="11" height="11" viewBox="0 0 14 14" fill="none"><path d="M7 2v7M7 2L4.5 4.5M7 2l2.5 2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 10.5V12a.5.5 0 0 0 .5.5h9a.5.5 0 0 0 .5-.5v-1.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      Import
    </button>
    <button class="btn btn-pdf" onclick="exportPDF()">
      <svg width="11" height="11" viewBox="0 0 14 14" fill="none"><path d="M2.5 1h6.2L12 4.8V13H2.5V1z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><path d="M8 1v4h4M4.5 7h5M4.5 9.5h3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      PDF
    </button>
  </div>
</div>
<div class="exp-panel" id="exp-panel">
  <div class="exp-inner">
    <div>
      <div class="exp-label">Filename</div>
      <div class="exp-fname-row">
        <input class="exp-fname" id="exp-fname" type="text" value="document" placeholder="filename (no extension)" spellcheck="false">
        <span class="exp-hint">.pdf · .docx · .html</span>
      </div>
    </div>
    <div class="exp-div"></div>
    <div>
      <div class="exp-label">HTML</div>
      <div class="exp-row">
        <button class="eb eb-acc" onclick="dlHTML('full')">
          <svg width="11" height="11" viewBox="0 0 14 14" fill="none"><path d="M7 10V3M7 10l-2.5-3M7 10l2.5-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 12h10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          Download full page
        </button>
        <button class="eb" onclick="dlHTML('frag')">
          <svg width="11" height="11" viewBox="0 0 14 14" fill="none"><path d="M7 10V3M7 10l-2.5-3M7 10l2.5-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 12h10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          HTML fragment
        </button>
        <button class="eb" onclick="copyHTML()">
          <svg width="11" height="11" viewBox="0 0 14 14" fill="none"><rect x="4" y="4" width="8" height="8" rx="1.2" stroke="currentColor" stroke-width="1.3"/><path d="M2 10V2h8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Copy HTML
        </button>
      </div>
    </div>
    <div class="exp-div"></div>
    <div>
      <div class="exp-label">Documents</div>
      <div class="exp-row">
        <button class="eb eb-hi" onclick="exportPDF()">
          <svg width="11" height="11" viewBox="0 0 14 14" fill="none"><path d="M2.5 1h6.2L12 4.8V13H2.5V1z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><path d="M8 1v4h4M4.5 7h5M4.5 9.5h3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          Download PDF
        </button>
        <button class="eb eb-acc" onclick="exportDOCX()">
          <svg width="11" height="11" viewBox="0 0 14 14" fill="none"><rect x="1.5" y="1.5" width="11" height="11" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M4 5h6M4 7.5h4M4 10h5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          Download DOCX
        </button>
      </div>
    </div>
  </div>
</div>
<div id="toast"></div>
<script>
const editor=document.getElementById('editor');
const preview=document.getElementById('preview');
let isDark=true,fNameLocked=false,saveTimer;
const FONT_URL='https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Serif:ital,wght@0,400;1,400&display=swap';

const PDF_BASE=`*{box-sizing:border-box;margin:0;padding:0;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
body{font-family:'IBM Plex Sans',sans-serif;font-size:10.5pt;line-height:1.75;font-weight:300;padding:0;margin:0}.pf-wrap{padding:15mm 18mm}
h1{font-family:'IBM Plex Serif',Georgia,serif;font-size:21pt;font-weight:400;margin:0 0 12pt;line-height:1.2}
h2{font-size:13pt;font-weight:500;margin:20pt 0 6pt;padding-bottom:4pt}
h3{font-family:'IBM Plex Mono',monospace;font-size:8pt;font-weight:500;margin:16pt 0 4pt;letter-spacing:.5px}
h4,h5,h6{font-size:10.5pt;font-weight:500;margin:12pt 0 3pt}
p{margin:0 0 8pt;font-weight:300}a{text-decoration:underline}
strong{font-weight:500}em{font-style:italic;font-family:'IBM Plex Serif',serif}
ul,ol{margin:0 0 8pt 18pt}li{margin:2pt 0;font-weight:300}
blockquote{margin:10pt 0;padding:8pt 12pt;font-style:italic}
code{font-family:'IBM Plex Mono',monospace;font-size:9pt;border-radius:2pt;padding:1pt 4pt}
pre{border-radius:3pt;padding:10pt 12pt;margin:8pt 0;overflow:hidden}
pre code{background:none!important;border:none!important;padding:0;font-size:8.5pt;line-height:1.8}
table{width:100%;border-collapse:collapse;margin:10pt 0;font-size:9.5pt}
th{font-family:'IBM Plex Mono',monospace;font-size:7.5pt;font-weight:500;text-align:left;padding:5pt 10pt;letter-spacing:.3px}
td{padding:5pt 10pt;font-weight:300}hr{border:none;margin:18pt 0}img{max-width:100%}
@page{margin:0;size:A4}body{margin:0!important;padding:0!important}`;

const PDF_LIGHT=PDF_BASE+`
html,body{background:#fff!important;color:#161616}
h1,h2,h4,h5,h6{color:#161616}h2{border-bottom:1pt solid #ccc}h3{color:#0f62fe}
a{color:#0f62fe}p,li{color:#161616}strong{color:#161616}
blockquote{border-left:2pt solid #0f62fe;color:#525252}
code{background:#e8e8e8!important;border:1pt solid #d8d8d8;color:#0f62fe}
pre{background:#f4f4f4!important;border:1pt solid #e0e0e0}pre code{color:#161616}
th{border-bottom:1pt solid #ccc;color:#6f6f6f}td{border-bottom:.5pt solid #e0e0e0;color:#161616}
hr{border-top:.5pt solid #e0e0e0}`;

const PDF_DARK=PDF_BASE+`
html{background:#161616!important}body{background:#161616!important;color:#f4f4f4}
h1,h2,h4,h5,h6{color:#f4f4f4}h2{border-bottom:1pt solid #393939}h3{color:#78a9ff}

const DEMO=`# MarkFlow Studio

A precise Markdown editor. Write left, preview right. Export to PDF, DOCX, or HTML. Supports **LaTeX** math via KaTeX.

Inline: the Euler identity $e^{i\pi} + 1 = 0$ and energy $E = mc^2$.

Block display:

$$
\int_0^\infty e^{-x^2}\,dx = \frac{\sqrt{\pi}}{2}
$$

$$
\mathbf{F} = m\mathbf{a} \quad \Rightarrow \quad \frac{d\mathbf{p}}{dt} = \mathbf{F}
$$

## Code

\`\`\`typescript
interface Exporter {
  toPDF(html: string, dark: boolean): void;
  toDOCX(markdown: string): Promise<Blob>;
  toHTML(html: string, dark: boolean): string;
}
\`\`\`

## Table

| Format | Editable | Dark mode | LaTeX |
|--------|:--------:|:---------:|:-----:|

/* ── LaTeX rendering with KaTeX ── */
let mathStore = [];

function extractMath(src) {
  mathStore = [];
  let out = src;

  // Block $$...$$ — replace before inline $ to avoid conflicts
  out = out.replace(/\$\$([\s\S]+?)\$\$/g, (raw, s) => {
    const i = mathStore.length;
    mathStore.push({ src: s.trim(), display: true });
    return `<span class="math-ph" data-mi="${i}"></span>`;
  });

  // Block \[...\]
  out = out.replace(/\\\[([\s\S]+?)\\\]/g, (raw, s) => {
    const i = mathStore.length;
    mathStore.push({ src: s.trim(), display: true });
    return `<span class="math-ph" data-mi="${i}"></span>`;
  });

  // Inline $...$ — must come AFTER block $$
  out = out.replace(/\$([^\$\n]+?)\$/g, (raw, s) => {
    const i = mathStore.length;
    mathStore.push({ src: s.trim(), display: false });
    return `<span class="math-ph" data-mi="${i}"></span>`;
  });

  // Inline \(...\)
  out = out.replace(/\\\((.+?)\\\)/g, (raw, s) => {
    const i = mathStore.length;
    mathStore.push({ src: s.trim(), display: false });
    return `<span class="math-ph" data-mi="${i}"></span>`;
  });

  return out;
}

function renderMath() {
  preview.querySelectorAll('.math-ph').forEach(el => {
    const i = parseInt(el.dataset.mi, 10);
    const entry = mathStore[i];
    if (!entry) return;
    try {
      const rendered = katex.renderToString(entry.src, {
        displayMode: entry.display,
        throwOnError: false,
        output: 'html'
      });
      const wrap = document.createElement(entry.display ? 'div' : 'span');
      if (entry.display) wrap.style.cssText = 'text-align:center;margin:1em 0;overflow-x:auto';
      wrap.innerHTML = rendered;
      el.replaceWith(wrap);
    } catch(e) {
      const err = document.createElement('span');
      err.style.cssText = 'color:#e05050;font-family:monospace;font-size:.85em';
      err.textContent = entry.src;
      el.replaceWith(err);
    }
  });
}

function render(){
  const extracted=extractMath(editor.value);
  const rawHtml=marked.parse(extracted);
  const sanitized=DOMPurify.sanitize(rawHtml,{ADD_TAGS:['span'],ADD_ATTR:['data-mi','class']});
  preview.innerHTML=sanitized;
  if(typeof katex!=='undefined') renderMath();
  if(!fNameLocked)autoFilename();
}

function exportPDF(){
  render();toast('preparing pdf…');
  const css=isDark?PDF_DARK:PDF_LIGHT;
  const iframe=document.createElement('iframe');
  iframe.style.cssText='position:fixed;top:-9999px;left:-9999px;width:210mm;height:1px;border:none;visibility:hidden';
  document.body.appendChild(iframe);
  const idoc=iframe.contentDocument||iframe.contentWindow.document;
  idoc.open();
  idoc.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="${FONT_URL}" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css"><style>${css}</style></head><body><div class="pf-wrap">${preview.innerHTML}</div></body></html>`);
  idoc.close();
  const doPrint=()=>{
    try{iframe.contentWindow.focus();iframe.contentWindow.print();}catch(e){}
    setTimeout(()=>{if(document.body.contains(iframe))document.body.removeChild(iframe)},3000);
  };
  if(idoc.fonts&&idoc.fonts.ready){idoc.fonts.ready.then(doPrint).catch(doPrint)}

}
function copyHTML(){navigator.clipboard.writeText(preview.innerHTML).then(()=>toast('✓ HTML copied'))}
function dlHTML(mode){
  const fname=getFilename('html'),css=isDark?HTML_DARK:HTML_LIGHT;

  const html=mode==='full'
    ?`<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width,initial-scale=1.0">\n<title>${title}</title>\n<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">\n<style>\n${css}\n</style>\n</head>\n<body>\n<div class="page">\n${preview.innerHTML}\n</div>\n</body>\n</html>`
    :preview.innerHTML;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([html],{type:'text/html;charset=utf-8'}));
  a.download=fname;a.click();URL.revokeObjectURL(a.href);
  toast('✓ downloaded: '+fname);
}
async function exportDOCX(){
  if(typeof docx==='undefined'){toast('docx library loading, retry shortly');return}
  toast('generating docx…');
  try{
    const{Document,Packer,Paragraph,TextRun,HeadingLevel,BorderStyle,Table,TableRow,TableCell,WidthType,AlignmentType,ShadingType}=docx;
    const lines=editor.value.split('\n');const children=[];let inCode=false,codeLines=[];
    const inline=txt=>{
      const runs=[];
      txt.split(/(\*\*.*?\*\*|\*[^*].*?[^*]\*|\*[^*]\*|`.*?`|~~.*?~~)/g).forEach(p=>{
        if(!p)return;
        if(p.startsWith('**')&&p.endsWith('**'))runs.push(new TextRun({text:p.slice(2,-2),bold:true}));
        else if(p.startsWith('*')&&p.endsWith('*'))runs.push(new TextRun({text:p.slice(1,-1),italics:true}));
        else if(p.startsWith('`')&&p.endsWith('`'))runs.push(new TextRun({text:p.slice(1,-1),font:'Courier New',size:18}));
        else if(p.startsWith('~~')&&p.endsWith('~~'))runs.push(new TextRun({text:p.slice(2,-2),strike:true}));
        else runs.push(new TextRun({text:p}));
      });
      return runs.length?runs:[new TextRun({text:txt})];
    };
    let i=0;
    while(i<lines.length){
      const l=lines[i];
      if(l.startsWith('```')){if(!inCode){inCode=true;codeLines=[];i++;continue}inCode=false;children.push(new Paragraph({children:[new TextRun({text:codeLines.join('\n'),font:'Courier New',size:18})],indent:{left:720},spacing:{before:120,after:120}}));i++;continue}
      if(inCode){codeLines.push(l);i++;continue}
      if(l.startsWith('|')){
        const rows=[];while(i<lines.length&&lines[i].startsWith('|')){if(!lines[i].match(/^\|[-| :]+\|$/))rows.push(lines[i]);i++}
        if(rows.length){children.push(new Table({rows:rows.map((r,ri)=>{const cells=r.split('|').filter((_,ci)=>ci>0&&ci<r.split('|').length-1);return new TableRow({children:cells.map(c=>new TableCell({children:[new Paragraph({children:inline(c.trim()),spacing:{before:60,after:60}})],shading:ri===0?{type:ShadingType.SOLID,color:'E8E8E8'}:undefined})),tableHeader:ri===0})}),width:{size:100,type:WidthType.PERCENTAGE}}));children.push(new Paragraph({text:'',spacing:{after:120}}))}
        continue;
      }
      if(l.match(/^(---|\*\*\*|___)\s*$/)){children.push(new Paragraph({text:'',border:{bottom:{color:'CCCCCC',space:1,style:BorderStyle.SINGLE,size:4}},spacing:{before:240,after:240}}));i++;continue}
      const hm=l.match(/^(#{1,6})\s+(.+)/);
      if(hm){const hmap=[HeadingLevel.HEADING_1,HeadingLevel.HEADING_2,HeadingLevel.HEADING_3,HeadingLevel.HEADING_4,HeadingLevel.HEADING_5,HeadingLevel.HEADING_6];children.push(new Paragraph({children:inline(hm[2]),heading:hmap[hm[1].length-1],spacing:{before:hm[1].length<=2?360:240,after:120}}));i++;continue}
      if(l.startsWith('> ')){children.push(new Paragraph({children:inline(l.slice(2)),indent:{left:720},spacing:{before:120,after:120},border:{left:{color:'0F62FE',space:10,style:BorderStyle.SINGLE,size:10}}}));i++;continue}
      if(l.match(/^[-*+]\s+/)){children.push(new Paragraph({children:inline(l.replace(/^[-*+]\s+/,'')),bullet:{level:0},spacing:{before:60,after:60}}));i++;continue}
      if(l.match(/^\d+\.\s+/)){children.push(new Paragraph({children:inline(l.replace(/^\d+\.\s+/,'')),numbering:{reference:'n1',level:0},spacing:{before:60,after:60}}));i++;continue}
      if(l.trim()===''){children.push(new Paragraph({text:'',spacing:{after:80}}));i++;continue}
      children.push(new Paragraph({children:inline(l),spacing:{before:0,after:140}}));i++;
    }
    const doc2=new Document({numbering:{config:[{reference:'n1',levels:[{level:0,format:'decimal',text:'%1.',alignment:AlignmentType.LEFT,style:{paragraph:{indent:{left:720,hanging:360}}}}]}]},sections:[{properties:{page:{margin:{top:1440,right:1440,bottom:1440,left:1440}}},children:children.length?children:[new Paragraph({text:''})]}]});
    const blob=await Packer.toBlob(doc2);
    const a=document.createElement('a');a.download=getFilename('docx');a.href=URL.createObjectURL(blob);a.click();URL.revokeObjectURL(a.href);
    toast('✓ docx downloaded');
  }catch(e){console.error(e);toast('export failed: '+e.message)}
}
function ins(a,b,ph){const s=editor.selectionStart,e2=editor.selectionEnd,sel=editor.value.substring(s,e2)||ph;editor.setRangeText(a+sel+b,s,e2,'end');if(!editor.value.substring(s,e2)){editor.selectionStart=s+a.length;editor.selectionEnd=s+a.length+ph.length}editor.focus();render();updateStats()}
function insLine(p){const s=editor.selectionStart,ls=editor.value.lastIndexOf('\n',s-1)+1;editor.setRangeText(p,ls,ls,'end');editor.focus();render();updateStats()}
function insCode(){const s=editor.selectionStart,e2=editor.selectionEnd;editor.setRangeText('\n```\n'+(editor.value.substring(s,e2)||'// code')+'\n```\n',s,e2,'end');editor.focus();render();updateStats()}
function insLink(){const s=editor.selectionStart,e2=editor.selectionEnd;editor.setRangeText('['+(editor.value.substring(s,e2)||'link text')+'](https://)',s,e2,'end');editor.focus();render();updateStats()}
function insTable(){editor.setRangeText('\n| Col A | Col B | Col C |\n|-------|-------|-------|\n| Cell  | Cell  | Cell  |\n| Cell  | Cell  | Cell  |\n',editor.selectionStart,editor.selectionStart,'end');editor.focus();render();updateStats()}
editor.addEventListener('keydown',e=>{if(e.key==='Tab'){e.preventDefault();const s=editor.selectionStart;editor.setRangeText('  ',s,editor.selectionEnd,'end');render();updateStats()}});

  if((e.ctrlKey||e.metaKey)&&e.shiftKey&&e.key.toLowerCase()==='d'){e.preventDefault();exportDOCX()}
});
(()=>{
  const dvd=document.getElementById('dvd');let drag=false,sx=0,sl=0,sr=0;
  dvd.addEventListener('mousedown',e=>{if(window.innerWidth<768)return;drag=true;sx=e.clientX;dvd.classList.add('drag');sl=document.getElementById('edp').getBoundingClientRect().width;sr=document.getElementById('pvp').getBoundingClientRect().width;document.body.style.cursor='col-resize';document.body.style.userSelect='none'});
  document.addEventListener('mousemove',e=>{if(!drag)return;const nl=Math.max(240,Math.min(sl+sr-240,sl+e.clientX-sx));document.getElementById('edp').style.cssText=`flex:none;width:${nl}px`;document.getElementById('pvp').style.cssText=`flex:none;width:${sl+sr-nl}px`});
  document.addEventListener('mouseup',()=>{drag=false;dvd.classList.remove('drag');document.body.style.cursor='';document.body.style.userSelect=''});
})();
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2800)}
render();updateStats();
